% epub.cfg --- tex4ht/tex4ebook configuration for EPUB3 output
% Part of the Catedra de Ciencias LaTeX project
%
% Usage:
%   tex4ebook -l -c epub.cfg -d epub catedraciencias.tex

\Preamble{xhtml,epub3,mathjax,fn-in}
  % =================================================================
  % Visual styles are in epub.css (external). This config only sets
  % @font-face inline as fallback; all other styling is in epub.css.
  % =================================================================

  \Css{%
    @font-face{font-family:"TeX Gyre Pagella";font-weight:normal;font-style:normal;src:url("fonts/texgyrepagella-regular.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Pagella";font-weight:bold;font-style:normal;src:url("fonts/texgyrepagella-bold.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Pagella";font-weight:normal;font-style:italic;src:url("fonts/texgyrepagella-italic.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Pagella";font-weight:bold;font-style:italic;src:url("fonts/texgyrepagella-bolditalic.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Pagella Math";font-weight:normal;font-style:normal;src:url("fonts/texgyrepagella-math.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Heros";font-weight:normal;font-style:normal;src:url("fonts/texgyreheros-regular.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Heros";font-weight:bold;font-style:normal;src:url("fonts/texgyreheros-bold.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Heros";font-weight:normal;font-style:italic;src:url("fonts/texgyreheros-italic.otf") format("opentype");}%
    @font-face{font-family:"TeX Gyre Heros";font-weight:bold;font-style:italic;src:url("fonts/texgyreheros-bolditalic.otf") format("opentype");}%
    @font-face{font-family:"JetBrains Mono NL";font-weight:normal;font-style:normal;src:url("fonts/JetBrainsMonoNL-Regular.ttf") format("truetype");}%
    @font-face{font-family:"JetBrains Mono NL";font-weight:bold;font-style:normal;src:url("fonts/JetBrainsMonoNL-Bold.ttf") format("truetype");}%
    @font-face{font-family:"JetBrains Mono NL";font-weight:normal;font-style:italic;src:url("fonts/JetBrainsMonoNL-Italic.ttf") format("truetype");}%
    @font-face{font-family:"JetBrains Mono NL";font-weight:bold;font-style:italic;src:url("fonts/JetBrainsMonoNL-BoldItalic.ttf") format("truetype");}%
  }

  % =================================================================
  % Minted — tell minted where to write temporary files
  % =================================================================
  \makeatletter
  \Configure{minted}
    {\def\minted@outputdir{.}}
    {}
  \makeatother

\begin{document}
  % =================================================================
  % Environment redefinitions (must be after \begin{document} to
  % use \HCode / \IgnorePar / \EndP)
  % =================================================================

  % digress --- sidebar/digression box
  \renewenvironment{digress}[1]{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="digress"><h4 class="digress-title">🔍 }%
    #1%
    \HCode{</h4>}%
    \ifvmode\IgnorePar\fi\EndP
  }{%
    \ifvmode\IgnorePar\fi\EndP\HCode{</div>}%
  }

  % remember --- key concept highlight box
  \renewenvironment{remember}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="remember"><h4 class="remember-title">💾 Para recordar</h4>}%
  }{%
    \ifvmode\IgnorePar\fi\EndP\HCode{</div>}%
  }

  % enestecapitulo --- chapter overview box
  \renewenvironment{enestecapitulo}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="enestecapitulo"><h4 class="enestecapitulo-title">🗺️ En este capítulo</h4>}%
    \begin{description}%
  }{%
    \end{description}%
    \ifvmode\IgnorePar\fi\EndP\HCode{</div>}%
  }

  % =================================================================
  % Theorem-like environments
  % =================================================================

  \renewenvironment{theorem}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="theorem">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{lemma}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="lemma">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{proposition}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="proposition">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{corollary}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="corollary">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{definition}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="definition">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{example}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="example">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{problem}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="problem">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{exercise}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="exercise">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{remark}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="remark">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{note}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="note">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  % =================================================================
  % Custom commands
  % =================================================================

  \renewcommand{\terminology}[2][]{%
    \HCode{<span class="terminology">}\textbf{#2}\HCode{</span>}%
  }

  \renewcommand{\Verdadero}{\HCode{<span class="sc">}Verdadero\HCode{</span>}}
  \renewcommand{\Falso}{\HCode{<span class="sc">}Falso\HCode{</span>}}

  \renewcommand{\footurl}[1]{%
    \HCode{<a class="footurl" href="}#1\HCode{">}#1\HCode{</a>}%
  }

  % =================================================================
  % Emoji → Unicode mapping (replaces LuaLaTeX-only emoji package)
  % =================================================================
  \expandafter\def\csname emoji@books\endcsname{📚}
  \expandafter\def\csname emoji@world-map\endcsname{🗺️}
  \expandafter\def\csname emoji@light-bulb\endcsname{💡}
  \expandafter\def\csname emoji@classical-building\endcsname{🏛️}
  \expandafter\def\csname emoji@telescope\endcsname{🔭}
  \expandafter\def\csname emoji@atom-symbol\endcsname{⚛️}
  \expandafter\def\csname emoji@robot\endcsname{🤖}
  \expandafter\def\csname emoji@thinking-face\endcsname{🤔}
  \expandafter\def\csname emoji@magnifying-glass-tilted-left\endcsname{🔍}
  \expandafter\def\csname emoji@brain\endcsname{🧠}
  \expandafter\def\csname emoji@globe-showing-americas\endcsname{🌎}
  \expandafter\def\csname emoji@warning\endcsname{⚠️}
  \expandafter\def\csname emoji@scroll\endcsname{📜}
  \expandafter\def\csname emoji@mag\endcsname{🔍}
  \expandafter\def\csname emoji@open-book\endcsname{📖}
  \expandafter\def\csname emoji@pen\endcsname{🖊️}
  \expandafter\def\csname emoji@desktop-computer\endcsname{🖥️}
  \expandafter\def\csname emoji@dart\endcsname{🎯}
  \expandafter\def\csname emoji@student\endcsname{🧑‍🎓}
  \expandafter\def\csname emoji@link\endcsname{🔗}
  \expandafter\def\csname emoji@fearful-face\endcsname{😨}
  \expandafter\def\csname emoji@building-construction\endcsname{🏗️}
  \expandafter\def\csname emoji@bar-chart\endcsname{📊}
  \expandafter\def\csname emoji@electric-plug\endcsname{🔌}
  \expandafter\def\csname emoji@rocket\endcsname{🚀}
  \expandafter\def\csname emoji@floppy-disk\endcsname{💾}

  \def\emoji#1{%
    \ifcsname emoji@#1\endcsname
      \HCode{\csname emoji@#1\endcsname}%
    \else
      \HCode{[#1]}%
    \fi
  }

  % =================================================================
  % Bibliography
  % =================================================================
  \Configure{bibitem}{\HCode{<span class="bibitem">}}{}{\HCode{</span>}}

\EndPreamble
