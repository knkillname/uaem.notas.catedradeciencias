% epub.cfg --- tex4ht/tex4ebook configuration for EPUB3 output
% Part of the Catedra de Ciencias LaTeX project
%
% Usage:
%   tex4ebook -l -c epub.cfg -d epub catedraciencias.tex

\Preamble{xhtml,epub3,mathml,fn-in}
  % =================================================================
  % CSS styles
  % =================================================================

  \Css{%
    body{font-family:Georgia,"Liberation Serif",serif;line-height:1.6;
          color:\#333;margin:0;padding:0.5em;widows:2;orphans:2;}%
    p{margin:0.5em 0;text-align:justify;text-indent:1.5em;}%
    a{color:\#1a237e;text-decoration:underline;}%
    img{max-width:100\%;height:auto;display:block;margin:1em auto;}%
    figure{margin:1em 0;text-align:center;}%
    figcaption{font-style:italic;font-size:0.9em;color:\#555;}%
  }

  \Css{%
    h1,h2,h3,h4{font-family:"Helvetica Neue",Arial,sans-serif;
                 color:\#1a237e;page-break-after:avoid;}%
    h1{font-size:1.6em;border-bottom:2px solid \#1a237e;padding-bottom:0.3em;}%
    h2{font-size:1.3em;}%
    h3{font-size:1.1em;}%
    h4{font-size:1em;}%
  }

  \Css{%
    .digress{background-color:\#fff0e0;border:1px solid \#d4a574;
             border-radius:4px;padding:0.8em 1em;margin:1em 0;}%
    .digress-title{font-family:"Helvetica Neue",Arial,sans-serif;
                   color:\#8b4513;font-weight:bold;margin:0 0 0.5em 0;}%
    .remember{background-color:\#e6e6fa;border:1px solid \#9c9cdd;
              border-radius:4px;padding:0.8em 1em;margin:1em 0;}%
    .remember-title{font-family:"Helvetica Neue",Arial,sans-serif;
                    color:\#4a4a8a;font-weight:bold;margin:0 0 0.5em 0;}%
    .terminology{font-weight:bold;}%
    .sc{font-variant:small-caps;font-weight:bold;}%
  }

  \Css{%
    .theorem,.lemma,.proposition,.corollary{margin:1em 0;padding:0.5em 1em;
      border-left:4px solid \#1a237e;background-color:\#f5f5ff;}%
    .definition,.example,.problem,.exercise{margin:1em 0;padding:0.5em 1em;
      border-left:4px solid \#2e7d32;background-color:\#f0faf0;}%
    .remark,.note{margin:1em 0;padding:0.3em 1em;
      border-left:4px solid \#ff8f00;background-color:\#fff8e1;}%
  }

  \Css{%
    .minted{font-family:"Courier New","Liberation Mono",monospace;
            font-size:0.85em;background:\#f5f5f5;padding:0.5em;
            border-left:3px solid \#1a237e;white-space:pre-wrap;}%
  }

  % =================================================================
  % Environment redefinitions
  % =================================================================

  % digress --- sidebar/digression box
  \renewenvironment{digress}[1]{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="digress"><h4 class="digress-title">🪄 }%
    #1%
    \HCode{</h4>}%
    \ifvmode\IgnorePar\fi\EndP
  }{%
    \ifvmode\IgnorePar\fi\EndP\HCode{</div>}%
  }

  % remember --- key concept highlight box
  \renewenvironment{remember}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="remember"><h4 class="remember-title">💾 Para recordar</h4>}%
  }{%
    \ifvmode\IgnorePar\fi\EndP\HCode{</div>}%
  }

  % =================================================================
  % Theorem-like environments
  % =================================================================

  \renewenvironment{theorem}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="theorem">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{lemma}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="lemma">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{proposition}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="proposition">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{corollary}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="corollary">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{definition}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="definition">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{example}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="example">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{problem}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="problem">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{exercise}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="exercise">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{remark}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="remark">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  \renewenvironment{note}{%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="note">}%
  }{\ifvmode\IgnorePar\fi\EndP\HCode{</div>}}

  % =================================================================
  % Custom commands
  % =================================================================

  \renewcommand{\terminology}[2][]{%
    \HCode{<span class="terminology">}\textbf{#2}\HCode{</span>}%
  }

  \renewcommand{\Verdadero}{\HCode{<span class="sc">}Verdadero\HCode{</span>}}
  \renewcommand{\Falso}{\HCode{<span class="sc">}Falso\HCode{</span>}}

  \renewcommand{\footurl}[1]{%
    \HCode{<a class="footurl" href="}#1\HCode{">}#1\HCode{</a>}%
  }

  % =================================================================
  % Minted
  % =================================================================
  \Configure{minted}{}

  % =================================================================
  % Bibliography
  % =================================================================
  \Configure{bibitem}{\HCode{<span class="bibitem">}}{}{\HCode{</span>}}

\begin{document}
\EndPreamble
